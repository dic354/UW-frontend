<nav class="navbar navbar-expand-lg sticky-top" id="navbar-urbanwear">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand" routerLink="/">
            URBAN<span>WEAR</span>
        </a>

        <!-- Botón hamburguesa (móvil) -->
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">

            <!-- Links centrados -->
            <ul class="navbar-nav position-absolute start-50 translate-middle-x mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" routerLink="/" routerLinkActive="active"
                        [routerLinkActiveOptions]="{ exact: true }">
                        Inicio
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/catalogo">
                        Catálogo
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/contacto">
                        Contacto
                    </a>
                </li>
            </ul>

            <!-- Derecha: iconos + login -->
            <ul class="navbar-nav ms-auto align-items-center gap-1">

                <!-- Carrito -->
                <li class="nav-item">
                    <a class="nav-link position-relative icon-btn" routerLink="/carrito">
                        <i class="bi bi-bag"></i>
                        <ng-container *ngIf="totalItems$ | async as total">
                            <span *ngIf="total > 0" class="position-absolute top-0 start-100 translate-middle
                       badge rounded-pill bg-primary">
                                {{ total }}
                            </span>
                        </ng-container>
                    </a>
                </li>

                <!-- Usuario NO logado -->
                <ng-container *ngIf="!(usuario$ | async)">
                    <li class="nav-item">
                        <a class="nav-link icon-btn" routerLink="/auth/login">
                            <i class="bi bi-person"></i>
                        </a>
                    </li>
                    <li class="nav-item ms-2">
                        <a class="btn btn-primary btn-sm px-4" routerLink="/auth/login">
                            Iniciar Sesión
                        </a>
                    </li>
                </ng-container>

                <!-- Usuario logado -->
                <ng-container *ngIf="usuario$ | async as usuario">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center gap-1" href="#"
                            data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle fs-5"></i>
                            <span class="d-none d-lg-inline">{{ usuario.nombre }}</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <a class="dropdown-item" routerLink="/perfil">
                                    <i class="bi bi-person me-2"></i>Mi perfil
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" routerLink="/perfil">
                                    <i class="bi bi-bag-check me-2"></i>Mis pedidos
                                </a>
                            </li>
                            <li *ngIf="usuario.rol === 'administrador'">
                                <hr class="dropdown-divider">
                            </li>
                            <li *ngIf="usuario.rol === 'administrador'">
                                <a class="dropdown-item text-primary" routerLink="/admin">
                                    <i class="bi bi-gear me-2"></i>Panel Admin
                                </a>
                            </li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <button class="dropdown-item text-danger" (click)="logout()">
                                    <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
                                </button>
                            </li>
                        </ul>
                    </li>
                </ng-container>

            </ul>
        </div>
    </div>
</nav>
