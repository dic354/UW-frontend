<div class="image-upload">

  <!-- Preview o imagen actual -->
  <div class="imagen-preview" *ngIf="preview || imagenActual">
    <img [src]="preview || imagenActual" alt="Preview">

    <!-- Overlay con opciones -->
    <div class="preview-overlay">
      <label class="btn-cambiar" [for]="'file-input-' + tipo">
        <i class="bi bi-pencil me-1"></i>Cambiar
      </label>
      <button class="btn-eliminar-img" (click)="eliminarImagen()">
        <i class="bi bi-trash"></i>
      </button>
    </div>

    <!-- Spinner mientras sube -->
    <div class="upload-spinner" *ngIf="subiendo">
      <div class="spinner-border text-primary"></div>
      <p class="small mt-2 text-white">Subiendo...</p>
    </div>
  </div>

  <!-- Zona de drop cuando no hay imagen -->
  <label
    class="upload-zone"
    [for]="'file-input-' + tipo"
    *ngIf="!preview && !imagenActual">

    <div *ngIf="!subiendo">
      <i class="bi bi-cloud-upload upload-icono"></i>
      <p class="upload-texto">Haz clic para subir una imagen</p>
      <p class="upload-sub">JPG, PNG, WebP — Max 5MB</p>
    </div>

    <div *ngIf="subiendo" class="text-center">
      <div class="spinner-border text-primary mb-2"></div>
      <p class="small text-muted">Subiendo imagen...</p>
    </div>

  </label>

  <!-- Input file oculto -->
  <input
    [id]="'file-input-' + tipo"
    type="file"
    accept="image/jpeg,image/png,image/webp,image/gif"
    class="d-none"
    (change)="onFileSelected($event)">

  <!-- Error -->
  <div *ngIf="errorMsg" class="upload-error">
    <i class="bi bi-exclamation-circle me-1"></i>{{ errorMsg }}
  </div>

</div>
