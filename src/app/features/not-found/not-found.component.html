<div class="not-found-page">
  <div class="not-found-content">

    <!-- Número 404 grande -->
    <div class="error-numero">404</div>

    <!-- Icono -->
    <div class="error-icono">
      <i class="bi bi-file-x"></i>
    </div>

    <!-- Texto -->
    <h1 class="error-titulo">Pagina no encontrada</h1>
    <p class="error-subtitulo">
      Parece que la pagina que buscas no existe o ha sido movida.
      No te preocupes, puedes volver a la tienda.
    </p>

    <!-- Acciones -->
    <div class="error-acciones">
      <a routerLink="/" class="btn-home">
        <i class="bi bi-house me-2"></i>
        Volver al inicio
      </a>
      <a routerLink="/catalogo" class="btn-catalogo">
        <i class="bi bi-bag me-2"></i>
        Ver catalogo
      </a>
    </div>

    <!-- Links rapidos -->
    <div class="links-rapidos">
      <span class="text-muted small">Quizas buscabas:</span>
      <a routerLink="/catalogo" class="link-rapido">Catalogo</a>
      <a routerLink="/auth/login" class="link-rapido">Login</a>
      <a routerLink="/contacto" class="link-rapido">Contacto</a>
    </div>

  </div>
</div>
